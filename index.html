<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>匿名提问箱 | ask.shenjingqu.xyz</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
    body{max-width:800px;margin:30px auto;padding:0 20px;background:#f7f8fa}
    .box{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px #00000010;margin-bottom:20px}
    textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;min-height:100px;margin:10px 0;resize:none}
    button{background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}
    .item{border:1px solid #eee;border-radius:10px;padding:16px;margin:12px 0}
    .q{color:#111;font-weight:500}
    .r{margin-top:10px;color:#3366cc;background:#f0f7ff;padding:10px;border-radius:6px}
    .time{margin-top:8px;font-size:12px;color:#999}
  </style>
</head>
<body>
<div class="box">
  <h2>匿名提问（无需登录）</h2>
  <textarea id="inputQ" placeholder="输入你想问的问题，提交所有人可见"></textarea>
  <button onclick="submitQuestion()">提交匿名提问</button>
</div>

<div class="box">
  <h3>全部问答公开列表</h3>
  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========== 这里替换成你自己的Supabase参数 ==========
const SUPABASE_URL = sb_publishable_4nkJo0KdktzFvHLrBDdIGw_d9eBuwG0;
const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyeW54dXFybXNtdWZydWRjY2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODY4MzAsImV4cCI6MjA5OTc2MjgzMH0.Rk6RtK9p4n1VRUjdZHjkNWdSb0OYz44_2nzkKKL99_c;
// ==============================================
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 加载所有问答
async function loadList(){
  const {data} = await supabase
    .from('questions')
    .select('*')
    .order('create_at',{asc:false});
  const wrap = document.getElementById('list');
  wrap.innerHTML = '';
  data.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="q">提问：${item.content}</div>
      ${item.reply ? `<div class="r">我的回复：${item.reply}</div>` : '<div style="color:#888">暂未回复</div>'}
      <div class="time">${new Date(item.create_at).toLocaleString()}</div>
    `;
    wrap.appendChild(div);
  })
}

// 匿名提交提问
async function submitQuestion(){
  const val = document.getElementById('inputQ').value.trim();
  if(!val) return alert('请输入内容');
  await supabase.from('questions').insert([{content:val}]);
  document.getElementById('inputQ').value = '';
  loadList();
  alert('提交成功，所有人均可查看');
}

window.onload = loadList;
// 每10秒自动刷新问答列表
setInterval(loadList,10000);
</script>
</body>
</html>
